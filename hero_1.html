<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Baheya — Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#FBF8F3;
    --gold:#C9A961;
    --gold-light:#E4D2A4;
    --black:#15120F;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ font-family:'Inter',sans-serif; background:var(--black); }
  .font-display{ font-family:'Cormorant',serif; }

  /* ============ HERO ============ */
  .hero{
    position:relative;
    width:100%;
    height:100vh;
    min-height:640px;
    overflow:hidden;
    background:var(--black);
    isolation:isolate;
  }

  /* Layered Ken-Burns crossfade slides */
  .hero-slides{
    position:absolute; inset:0;
    will-change:transform;
  }
  .hero-slide{
    position:absolute; inset:0;
    background-size:cover;
    background-position:center;
    opacity:0;
    animation: heroFade 18s infinite;
    will-change:opacity, transform;
  }
  .hero-slide.s1{
    background-image:url('hero-assets/storefront.jpg');
    animation-delay:0s;
  }
  .hero-slide.s2{
    background-image:url('hero-assets/lobby.jpg');
    animation-delay:6s;
  }
  .hero-slide.s3{
    background-image:url('hero-assets/suite.jpg');
    animation-delay:12s;
  }
  /* each slide: fade in, hold + slow zoom, fade out -> seamless 18s loop, 3 slides x 6s */
  @keyframes heroFade{
    0%      { opacity:0; transform:scale(1.04); }
    4%      { opacity:1; }
    29%     { opacity:1; transform:scale(1.12); }
    33.3%   { opacity:0; transform:scale(1.14); }
    100%    { opacity:0; transform:scale(1.14); }
  }

  /* Color wash to unify the three different shots into one palette */
  .hero-grade{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(21,18,15,0.55) 0%, rgba(21,18,15,0.25) 35%, rgba(21,18,15,0.65) 100%),
      linear-gradient(120deg, rgba(201,169,97,0.18), rgba(21,18,15,0.1) 60%);
    mix-blend-mode:multiply;
    pointer-events:none;
  }
  .hero-grade-warm{
    position:absolute; inset:0;
    background:radial-gradient(circle at 30% 20%, rgba(228,210,164,0.18), transparent 55%);
    pointer-events:none;
  }
  .hero-vignette{
    position:absolute; inset:0;
    box-shadow:inset 0 0 180px 60px rgba(21,18,15,0.55);
    pointer-events:none;
  }

  /* Floating gold monogram badge — parallax layer (mouse + scroll) */
  .hero-monogram{
    position:absolute;
    top:14%;
    right:8%;
    width:84px; height:84px;
    border:1px solid rgba(228,210,164,0.55);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(6px);
    background:rgba(255,255,255,0.04);
    color:var(--gold-light);
    font-family:'Cormorant',serif;
    font-size:1.6rem;
    letter-spacing:0.05em;
    animation:monoFloat 7s ease-in-out infinite;
    will-change:transform;
    z-index:3;
  }
  @keyframes monoFloat{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-16px); }
  }

  /* secondary floating accent dot */
  .hero-dot{
    position:absolute;
    width:6px; height:6px;
    border-radius:50%;
    background:var(--gold-light);
    opacity:.7;
    animation:dotFloat 9s ease-in-out infinite;
    z-index:3;
  }
  .hero-dot.d1{ top:32%; left:10%; animation-delay:.5s; }
  .hero-dot.d2{ top:70%; left:18%; animation-delay:2.5s; }
  .hero-dot.d3{ top:22%; left:6%; animation-delay:4.5s; }
  @keyframes dotFloat{
    0%,100%{ transform:translate(0,0); opacity:.3; }
    50%{ transform:translate(10px,-22px); opacity:.9; }
  }

  /* Content */
  .hero-content{
    position:relative;
    z-index:4;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    max-width:1280px;
    margin:0 auto;
    padding:0 6vw;
    color:var(--ivory);
  }
  .hero-eyebrow{
    font-size:12px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--gold-light);
    margin-bottom:1.6rem;
    opacity:0;
    animation:riseIn 1s cubic-bezier(.16,1,.3,1) .2s forwards;
  }
  .hero-title{
    font-family:'Cormorant',serif;
    font-weight:300;
    font-size:clamp(2.6rem, 6.2vw, 5.6rem);
    line-height:1.0;
    margin-bottom:1.4rem;
    opacity:0;
    animation:riseIn 1.1s cubic-bezier(.16,1,.3,1) .4s forwards;
  }
  .hero-title em{ font-style:italic; color:var(--gold-light); }
  .hero-thread{
    width:0;
    max-width:120px;
    height:1px;
    background:linear-gradient(90deg, var(--gold-light), transparent);
    margin-bottom:1.8rem;
    animation:threadGrow 1.4s cubic-bezier(.16,1,.3,1) 1s forwards;
  }
  @keyframes threadGrow{ to{ width:120px; } }
  .hero-sub{
    font-weight:300;
    font-size:1.05rem;
    line-height:1.7;
    max-width:480px;
    color:rgba(251,248,243,0.8);
    margin-bottom:2.6rem;
    opacity:0;
    animation:riseIn 1.1s cubic-bezier(.16,1,.3,1) .6s forwards;
  }
  .hero-actions{
    display:flex;
    gap:1rem;
    flex-wrap:wrap;
    margin-bottom:3.6rem;
    opacity:0;
    animation:riseIn 1.1s cubic-bezier(.16,1,.3,1) .8s forwards;
  }
  .btn{
    font-size:12px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    text-decoration:none;
    padding:1.05rem 2.1rem;
    border-radius:999px;
    transition:transform .4s cubic-bezier(.16,1,.3,1), box-shadow .4s, background .4s, border-color .4s;
    display:inline-flex;
    align-items:center;
  }
  .btn-gold{
    background:linear-gradient(120deg, var(--gold), var(--gold-light));
    color:var(--black);
  }
  .btn-gold:hover{ transform:translateY(-2px); box-shadow:0 18px 36px -14px rgba(201,169,97,0.65); }
  .btn-outline{
    border:1px solid rgba(251,248,243,0.4);
    color:var(--ivory);
  }
  .btn-outline:hover{ border-color:var(--gold-light); background:rgba(228,210,164,0.1); }

  /* Floating stats — glass cards */
  .hero-stats{
    display:flex;
    gap:1px;
    background:rgba(251,248,243,0.18);
    border-radius:1rem;
    overflow:hidden;
    backdrop-filter:blur(14px) saturate(140%);
    border:1px solid rgba(251,248,243,0.18);
    width:fit-content;
    opacity:0;
    animation:riseIn 1.1s cubic-bezier(.16,1,.3,1) 1s forwards;
  }
  .hero-stat{
    background:rgba(21,18,15,0.35);
    padding:1.1rem 1.8rem;
    text-align:center;
  }
  .hero-stat .num{
    font-family:'Cormorant',serif;
    font-size:1.5rem;
    color:var(--gold-light);
    margin-bottom:.2rem;
  }
  .hero-stat .label{
    font-size:9.5px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:rgba(251,248,243,0.65);
  }

  @keyframes riseIn{
    from{ opacity:0; transform:translateY(22px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* Scroll cue */
  .hero-scroll{
    position:absolute;
    bottom:2.4rem;
    left:50%;
    transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:.5rem;
    color:rgba(251,248,243,0.55);
    z-index:4;
  }
  .hero-scroll span{ font-size:9.5px; letter-spacing:0.18em; text-transform:uppercase; }
  .hero-scroll .line{
    width:1px; height:36px;
    background:rgba(251,248,243,0.25);
    position:relative; overflow:hidden;
  }
  .hero-scroll .line::after{
    content:''; position:absolute; inset-inline:0; top:0; height:30%;
    background:var(--gold-light);
    animation:scrollPulse 2.2s ease-in-out infinite;
  }
  @keyframes scrollPulse{
    0%{ transform:translateY(-100%); }
    100%{ transform:translateY(330%); }
  }

  /* progress indicator for slide loop (subtle, optional) */
  .hero-progress{
    position:absolute;
    bottom:2.4rem;
    right:6vw;
    display:flex;
    gap:.4rem;
    z-index:4;
  }
  .hero-progress i{
    display:block;
    width:26px; height:2px;
    background:rgba(251,248,243,0.25);
    position:relative;
    overflow:hidden;
  }
  .hero-progress i::after{
    content:''; position:absolute; inset:0;
    background:var(--gold-light);
    transform:scaleX(0);
    transform-origin:left;
    animation:segFill 18s infinite;
  }
  .hero-progress i:nth-child(1)::after{ animation-delay:0s; }
  .hero-progress i:nth-child(2)::after{ animation-delay:6s; }
  .hero-progress i:nth-child(3)::after{ animation-delay:12s; }
  @keyframes segFill{
    0%{ transform:scaleX(0); }
    1%{ transform:scaleX(0); }
    33.3%{ transform:scaleX(1); }
    33.4%{ transform:scaleX(1); }
    100%{ transform:scaleX(1); }
  }
  /* reset other two bars to 0 while one fills — handled visually since each loops 18s with offset */

  /* ============ RESPONSIVE ============ */
  @media (max-width:768px){
    .hero{ height:100svh; min-height:560px; }
    .hero-monogram{ width:64px; height:64px; font-size:1.2rem; top:10%; right:6%; }
    .hero-stats{ flex-wrap:wrap; }
    .hero-stat{ padding:.9rem 1.1rem; }
    .hero-progress{ display:none; }
    .hero-content{ padding:0 6vw; }
  }
  @media (max-width:480px){
    .hero-sub{ font-size:.95rem; }
    .hero-actions{ width:100%; }
    .btn{ flex:1; justify-content:center; }
  }

  @media (prefers-reduced-motion: reduce){
    .hero-slide{ animation:none !important; opacity:0; }
    .hero-slide.s1{ opacity:1; }
    .hero-monogram, .hero-dot, .hero-scroll .line::after{ animation:none !important; }
  }
</style>
</head>
<body>

<section class="hero" id="baheyaHero">
  <div class="hero-slides" id="heroParallax">
    <div class="hero-slide s1"></div>
    <div class="hero-slide s2"></div>
    <div class="hero-slide s3"></div>
    <div class="hero-grade"></div>
    <div class="hero-grade-warm"></div>
    <div class="hero-vignette"></div>
  </div>

  <span class="hero-dot d1"></span>
  <span class="hero-dot d2"></span>
  <span class="hero-dot d3"></span>
  <div class="hero-monogram">BH</div>

  <div class="hero-content">
    <p class="hero-eyebrow">Riyadh · Est. Beauty House</p>
    <h1 class="hero-title">Luxury Beauty<br/>Crafted For <em>You.</em></h1>
    <div class="hero-thread"></div>
    <p class="hero-sub">Experience timeless beauty with world-class salon services designed to make every woman feel confident, elegant and radiant.</p>
    <div class="hero-actions">
      <a href="#book" class="btn btn-gold">Book Appointment</a>
      <a href="#services" class="btn btn-outline">Explore Services</a>
    </div>
    <div class="hero-stats">
      <div class="hero-stat"><div class="num">20+</div><div class="label">Years Experience</div></div>
      <div class="hero-stat"><div class="num">100K+</div><div class="label">Happy Clients</div></div>
      <div class="hero-stat"><div class="num">Award</div><div class="label">Beauty Experts</div></div>
    </div>
  </div>

  <div class="hero-progress"><i></i><i></i><i></i></div>

  <div class="hero-scroll">
    <span>Scroll</span>
    <div class="line"></div>
  </div>
</section>

<script>
  // Lightweight parallax: mouse + scroll, transform-only (GPU friendly), throttled via rAF
  (function(){
    const layer = document.getElementById('heroParallax');
    const hero = document.getElementById('baheyaHero');
    let targetX = 0, targetY = 0, curX = 0, curY = 0;
    let scrollOffset = 0;
    let ticking = false;

    function onMove(e){
      const rect = hero.getBoundingClientRect();
      const cx = (e.clientX - rect.left) / rect.width - 0.5;
      const cy = (e.clientY - rect.top) / rect.height - 0.5;
      targetX = cx * 18;   // max 18px shift
      targetY = cy * 12;
      requestTick();
    }
    function onScroll(){
      scrollOffset = Math.min(window.scrollY * 0.18, 80);
      requestTick();
    }
    function requestTick(){
      if(!ticking){
        requestAnimationFrame(update);
        ticking = true;
      }
    }
    function update(){
      curX += (targetX - curX) * 0.08;
      curY += (targetY - curY) * 0.08;
      layer.style.transform = `translate3d(${curX}px, ${curY + scrollOffset}px, 0)`;
      ticking = false;
      if(Math.abs(targetX-curX) > 0.05 || Math.abs(targetY-curY) > 0.05){
        requestTick();
      }
    }

    if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
      hero.addEventListener('mousemove', onMove, {passive:true});
      window.addEventListener('scroll', onScroll, {passive:true});
    }
  })();
</script>

</body>
</html>
